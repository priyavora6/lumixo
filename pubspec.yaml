name: lumixo
description: Transform With Love & Light

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase & Google
  firebase_core: ^2.31.0
  firebase_auth: ^4.19.0
  firebase_messaging: ^14.9.0
  cloud_firestore: ^4.17.0
  firebase_storage: ^11.7.0
  google_sign_in: ^6.2.1
  firebase_app_check: ^0.2.2+5

  # State Management
  provider: ^6.1.1

  # UI & Animations
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  lottie: ^2.7.0
  smooth_page_indicator: ^1.1.0

  # Notifications
  flutter_local_notifications: ^17.0.0 # CORRECTED: Upgraded to fix build error
  timezone: ^0.9.2

  # Image, File & Sharing
  image_picker: ^1.0.4
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  shared_preferences: ^2.2.2
  gal: ^2.3.2
  flutter_image_compress: ^2.1.0

  # Other Utilities
  http: ^1.2.0
  intl: ^0.18.1
  razorpay_flutter: ^1.3.5
  package_info_plus: ^9.0.0
  url_launcher: ^6.2.2
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
